<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Sampah 3 Mode</title>
<style>
body{margin:0;font-family:sans-serif;background:#111;color:#fff;text-align:center}
.hidden{display:none}
.screen{padding:20px}
.card{border:2px solid #fff;margin:10px;padding:20px;border-radius:10px;cursor:pointer}
button{padding:10px 20px;margin-top:10px}
#gameArea{position:relative;height:60vh;border:2px solid #fff;margin:10px}
.target,.falling{position:absolute;border-radius:50%}
#basket{position:absolute;bottom:10px;width:80px;height:40px;background:green}
#claw{position:absolute;top:0;width:20px;height:60px;background:#fff}
.bar{height:10px;background:lime}
</style>
</head>
<body>

<!-- MENU -->
<div id="menu" class="screen">
<h2>Pilih Game</h2>
<div class="card" onclick="startGame('claw')">Claw Machine</div>
<div class="card" onclick="startGame('tap')">Tap Target</div>
<div class="card" onclick="startGame('catch')">Catch Basket</div>
</div>

<!-- GAME -->
<div id="game" class="screen hidden">
<div>Score: <span id="score">0</span></div>
<div class="bar" id="timer"></div>
<div id="gameArea"></div>
<div id="info"></div>
<button onclick="backMenu()">Back</button>
</div>

<script>
let mode="",score=0,time=100,interval,objects=[];
const area=document.getElementById("gameArea");

function startGame(m){
mode=m;
score=0; time=100;
document.getElementById("menu").classList.add("hidden");
document.getElementById("game").classList.remove("hidden");
area.innerHTML="";
run();
}

function backMenu(){
clearInterval(interval);
document.getElementById("game").classList.add("hidden");
document.getElementById("menu").classList.remove("hidden");
}

function run(){
interval=setInterval(()=>{
time--;
document.getElementById("timer").style.width=time+"%";
if(time<=0){clearInterval(interval);alert("Game Over");backMenu();}
},100);

if(mode==="tap") tapGame();
if(mode==="catch") catchGame();
if(mode==="claw") clawGame();
}

function updateScore(v){
score+=v;
document.getElementById("score").innerText=score;
}

function randomType(){
let types=["organik","anorganik","b3"];
return types[Math.floor(Math.random()*3)];
}

function getColor(type){
return type==="organik"?"green":type==="anorganik"?"gray":"red";
}

/* TAP GAME */
function tapGame(){
let targetType=randomType();
document.getElementById("info").innerText="PILIH: "+targetType;

setInterval(()=>{
targetType=randomType();
document.getElementById("info").innerText="PILIH: "+targetType;
},2000);

setInterval(()=>{
let d=document.createElement("div");
let type=randomType();
d.className="target";
d.style.background=getColor(type);
d.style.width=d.style.height="50px";
d.style.left=Math.random()*90+"%";
d.style.top=Math.random()*80+"%";
d.onclick=()=>{updateScore(type===targetType?10:-5);d.remove();}
area.appendChild(d);
setTimeout(()=>d.remove(),2000);
},800);
}

/* CATCH GAME */
function catchGame(){
let basket=document.createElement("div");
basket.id="basket";
area.appendChild(basket);

let modeType=randomType();
setInterval(()=>{
modeType=randomType();
basket.style.background=getColor(modeType);
document.getElementById("info").innerText=modeType;
},2000);

document.addEventListener("mousemove",e=>{
basket.style.left=e.clientX-40+"px";
});

setInterval(()=>{
let f=document.createElement("div");
let type=randomType();
f.className="falling";
f.style.background=getColor(type);
f.style.width=f.style.height="30px";
f.style.left=Math.random()*90+"%";
f.style.top="0px";
area.appendChild(f);

let fall=setInterval(()=>{
f.style.top=(f.offsetTop+5)+"px";

if(f.offsetTop>area.offsetHeight-50){
if(Math.abs(f.offsetLeft-basket.offsetLeft)<50){
updateScore(type===modeType?10:-5);
}
f.remove();
clearInterval(fall);
}
},30);
},1000);
}

/* CLAW GAME (simple) */
function clawGame(){
let claw=document.createElement("div");
claw.id="claw";
area.appendChild(claw);
let x=0,dir=1;

setInterval(()=>{
x+=dir*5;
if(x>area.offsetWidth-20||x<0)dir*=-1;
claw.style.left=x+"px";
},50);

area.onclick=()=>{
let grabY=0;
let down=setInterval(()=>{
grabY+=5;
claw.style.top=grabY+"px";
if(grabY>200){
updateScore(10);
clearInterval(down);
let up=setInterval(()=>{
grabY-=5;
claw.style.top=grabY+"px";
if(grabY<=0) clearInterval(up);
},30);
}
},30);
};
}
</script>

</body>
</html>
